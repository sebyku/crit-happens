rules:
  - keyword: "bonjour"
    priority: 3
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Bonjour, aventurier."
          - "Salutations. Qu'est-ce qui vous amene ?"

  - keyword: "salut"
    priority: 3
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Salut. Que puis-je faire pour vous ?"
          - "Salut."

  - keyword: "desole"
    priority: 1
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Pas besoin de vous excuser."
          - "Il n'y a pas de quoi etre desole."

  - keyword: "oui"
    priority: 1
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Je vois."
          - "Continuez."
          - "Vous semblez certain."

  - keyword: "non"
    priority: 1
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Pourquoi pas ?"
          - "Vous etes sur ?"

  - keyword: "@none"
    priority: 0
    patterns:
      - decomposition: ".*"
        reassemblies:
          - "Interessant... dites-m'en plus."
          - "Je vois. Continuez."
          - "Hmm, quoi d'autre ?"
          - "Pouvez-vous developper ?"
