items:
  rusted_key:
    name: Clé rouillée
    description: Une vieille clé donnée par un mystérieux étranger. On dirait qu'elle ouvre quelque chose d'ancien.
    icon: rusted_key.svg

  iron_sword:
    name: Épée en fer
    description: Une épée en fer bien forgée, tranchante et équilibrée. +6 Attaque.
    icon: iron_sword.svg
    attack: 6
    slots:
      - right_hand

  wooden_shield:
    name: Bouclier en bois
    description: Un solide bouclier en bois renforcé de bandes de fer. +2 CA.
    icon: wooden_shield.svg
    ac: 2
    slots:
      - left_hand

  iron_helmet:
    name: Casque en fer
    description: Un casque en fer simple mais fiable. +1 CA.
    icon: iron_helmet.svg
    ac: 1
    slots:
      - head
