title: Crit Happens
description: Un voyage où chaque choix compte

steps:
  1_start:
    description: Vous êtes sur la place d'un petit village. Une fontaine coule doucement au centre. Autour de vous, quelques bâtiments attirent votre attention.
    image: village_square.jpg
    reactions:
      - label: Aller à la taverne
        goto: 3_tavern
      - label: Aller chez l'armurier
        goto: 17_armorer
      - label: Aller à l'église
        goto: 18_church
      - label: Sortir du village
        goto: 19_village_exit

  17_armorer:
    description: L'échoppe de l'armurier est petite mais bien rangée. Des épées, boucliers et casques s'alignent sur les murs. Le forgeron vous accueille avec un sourire chaleureux.
    image: armorer.jpg
    character: blacksmith
    reactions:
      - label: Retourner sur la place
        goto: 1_start

  18_church:
    description: L'église est calme et fraîche. La lumière filtre à travers les vitraux, projetant des couleurs sur les bancs de bois. Un prêtre prie en silence près de l'autel.
    image: church.jpg
    reactions:
      - label: Prier un moment
        goto: 18_church
      - label: Retourner sur la place
        goto: 1_start

  19_village_exit:
    description: Vous quittez le village par un chemin de terre. Au loin, à travers les arbres, vous apercevez l'entrée sombre d'un donjon. Le chemin y mène directement.
    image: way_to_dungeon.jpg
    reactions:
      - label: Entrer dans le donjon
        goto: 2_dark_corridor
      - label: Retourner au village
        goto: 1_start

  2_dark_corridor:
    description: Le couloir s'étend devant vous, se divisant en deux chemins. À gauche, vous entendez un grognement sourd. À droite, l'éclat de quelque chose de brillant attire votre regard.
    image: dark_corridor.jpg
    reactions:
      - label: Suivre le grognement
        goto: 7_beast_lair
      - label: Suivre l'éclat
        goto: 10_treasure_room
      - label: Retourner au village
        goto: 1_start

  3_tavern:
    description: La taverne est chaleureuse et bruyante. Un étranger encapuchonné vous fait signe depuis une table dans un coin, glissant une carte usée sur le bois.
    image: tavern.jpg
    reactions:
      - label: S'asseoir avec l'étranger
        goto: 4_stranger_quest
      - label: L'ignorer et commander à boire
        goto: 6_tavern_rest
      - label: Retourner sur la place
        goto: 1_start

  4_stranger_quest:
    description: Un étranger encapuchonné se penche vers vous et commence à murmurer. Il semble connaître des choses sur le donjon.
    image: tavern_stranger.jpg
    character: stranger
    reactions:
      - label: Quitter la taverne
        goto: 1_start

  5_stranger_details:
    description: '"Ne faites confiance à personne là-bas," dit-il. "Surtout pas au coffre qui parle." Il disparaît dans la foule avant que vous ne puissiez répondre.'
    reactions:
      - label: Retourner sur la place
        goto: 1_start

  6_tavern_rest:
    description: Vous savourez un repas chaud et une bière fraîche. Reposé et prêt, vous sentez l'appel de l'aventure vous attirer à nouveau.
    gold: -2
    hp: 20
    reactions:
      - label: Retourner sur la place
        goto: 1_start

  7_beast_lair:
    description: Une créature massive semblable à un loup bloque le passage. Ses yeux luisent d'un bleu pâle — elle semble plus curieuse qu'agressive.
    image: beast_lair.jpg
    reactions:
      - label: Essayer de calmer la bête
        goto: 8_beast_ally
      - label: Dégainer votre arme
        goto: 9_beast_fight
      - label: Reculer lentement
        goto: 2_dark_corridor

  8_beast_ally:
    description: Vous tendez la main. La bête renifle prudemment, puis se blottit contre elle. Elle s'écarte, révélant un passage caché derrière elle.
    image: beast_ally.jpg
    reactions:
      - label: Entrer dans le passage caché
        goto: 12_secret_vault
        requires: rusted_key
      - label: Continuer dans le couloir
        goto: 10_treasure_room

  9_beast_fight:
    description: La créature bondit ! Après un combat féroce, vous parvenez à la repousser, mais vous êtes blessé. Le passage derrière elle est maintenant dégagé.
    hp: -30
    reactions:
      - label: Continuer malgré vos blessures
        goto: 12_secret_vault
      - label: Battre en retraite et récupérer
        goto: 6_tavern_rest

  10_treasure_room:
    description: Une petite salle scintille de pièces d'or éparpillées sur le sol. Au centre trône un coffre en bois — et il... fredonne ?
    image: treasure_room.jpg
    reactions:
      - label: Ouvrir le coffre
        goto: 11_mimic_encounter
      - label: Ramasser les pièces et partir
        goto: 13_ending_modest
        gold: 15

  11_mimic_encounter:
    description: Le coffre s'ouvre brusquement, révélant des rangées de dents ! C'est un mimic ! Il vous mord, mais vous esquivez juste à temps.
    image: mimic.jpg
    reactions:
      - label: Combattre le mimic
        goto: 14_ending_hero
      - label: Fuir !
        goto: 2_dark_corridor

  12_secret_vault:
    description: Vous descendez dans une vaste chambre forte souterraine. D'anciens trésors tapissent les murs — des reliques d'une civilisation oubliée. Au fond, un cristal lumineux pulse d'énergie.
    items_take:
      - rusted_key
    reactions:
      - label: Prendre le cristal
        goto: 15_ending_legendary
      - label: Le laisser intact
        goto: 16_ending_wise

  13_ending_modest:
    description: Vous quittez le donjon les poches pleines d'or. Pas le plus grand butin, mais assez pour vivre confortablement un moment. Parfois, le bon choix est de savoir quand partir.
    reactions: []

  14_ending_hero:
    description: Vous terrassez le mimic dans un combat épique ! Dans son corps creux, vous trouvez une épée légendaire. Les bardes chanteront ce jour.
    reactions: []

  15_ending_legendary:
    description: Le cristal vous remplit d'un pouvoir ancien. Vous émergez du donjon à jamais changé — une légende vivante. Mais les murmures du cristal ne s'arrêtent jamais vraiment...
    reactions: []

  16_ending_wise:
    description: Vous quittez la chambre forte telle que vous l'avez trouvée. Certains trésors ne sont pas faits pour être pris. Le donjon se souvient de votre respect, et le chemin du retour est étrangement facile.
    reactions: []